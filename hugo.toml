baseURL = "https://your-blog.pages.dev/"
languageCode = "zh-cn"
title = "我的个人博客"
theme = "hugo-PaperMod"
paginate = 10
enableRobotsTXT = true

[params]
  env = "production"
  title = "我的个人博客"
  description = "记录技术、生活与思考"
  keywords = ["Blog", "技术", "生活"]
  author = "博主"
  DateFormat = "2006年1月2日"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  disableAnchoredHeadings = false
  hideSummary = false
  showtoc = true
  tocopen = false

[params.profileMode]
  enabled = true
  title = "欢迎来到我的博客"
  subtitle = "分享技术、记录生活、探索世界"
  imageUrl = "/images/avatar.svg"
  imageTitle = "头像"
  imageWidth = 120
  imageHeight = 120

[params.socialIcons]
  - name = "github"
    url = "https://github.com/"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
